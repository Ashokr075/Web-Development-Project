<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBoxLayout</title>
    <link rel="stylesheet" href="FlexBoxLayout.css">
</head>
<body>
    <div id="headings_container">
        <h1 class="headings">CoreJava</h1>
        <h1 class="headings">AdvancedJava</h1>
        <h1 class="headings">WebDevelopment</h1>
        <h1 class="headings">SQL</h1>
    </div>
    <div id="numeric_headings_container">
        <h1 class="numeric_headings">One</h1>
        <h1 class="numeric_headings">Two</h1>
        <h1 class="numeric_headings">Three</h1>
        <h1 class="numeric_headings">Four</h1>
        <h1 class="numeric_headings">Five</h1>
        <h1 class="numeric_headings">Six</h1>
        <h1 class="numeric_headings">Seven</h1>
        <h1 class="numeric_headings">Eight</h1>
    </div>
    <div id="circular_blocks_container">
        <div class="circular_blocks"></div>
        <div class="circular_blocks"></div>
        <div class="circular_blocks"></div>
        <div class="circular_blocks"></div>
        <div class="circular_blocks"></div>
    </div>
    <div id="squares_container">
        <div class="squares"></div>
        <div class="squares"></div>
        <div class="squares"></div>
        <div class="squares"></div>
        <div class="squares"></div>
    </div>
    <div id="roman_number_headings_container">
        <h1 class="roman_number_headings">I</h1>
        <h1 class="roman_number_headings">II</h1>
        <h1 class="roman_number_headings">III</h1>
        <h1 class="roman_number_headings">IV</h1>
        <h1 class="roman_number_headings">V</h1>
    </div>
    <div id="rectangles_container">
        <div class="rectangles"></div>
        <div class="rectangles"></div>
        <div class="rectangles"></div>
        <div class="rectangles"></div>
        <div class="rectangles"></div>
        <div class="rectangles"></div>
        <div class="rectangles"></div>
        <div class="rectangles"></div>
        <div class="rectangles"></div>
        <div class="rectangles"></div>
    </div>
    <div id="numbers_container">
        <div class="numbers">1</div>
        <div class="numbers">2</div>
        <div class="numbers">3</div>
        <div class="numbers">4</div>
        <div class="numbers">5</div>
    </div>
</body>
</html>
