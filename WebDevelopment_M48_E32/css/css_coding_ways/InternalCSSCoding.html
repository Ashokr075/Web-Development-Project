<!DOCTYPE html>
<html lang="en">
<head>

    <title>InternalCSSCoding</title>
    <link rel="icon" href="../../assets/images/HTMLIcon.png">
    <style>
        h1{
            /* property: value; */
            font-size: 65px;

        }
        input{

            /* property: value; */

            border: none;
        }
