<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InlineCSSCoding</title>
    <link rel="icon" href="../../assets/images/HTMLIcon.png">
    <style>
        div{
            width: 200px;
            height: 200px;
            background-color: darkblue;
        }
    </style>
    <link rel="stylesheet" href="InlineCSSCoding.css">
</head>
<body>
    <div style="width: 50px;height: 50px;background-color: orange;"></div>
    <h1 style="font-size: 65px;color: red;">CoreJava</h1>
    <h1 style="font-size: 65px;color: red;">WebDevelopment</h1>
    <h1 style="font-size: 65px; color: red;">StructuredQueryLanguage</h1>
    <input style="font-size: 30px;outline: none;border: 3px solid red;" type="text" name="Username" id="username_inputbox" placeholder="Username">
    <input style="font-size: 30px;outline: none;border: 3px solid red;" type="password" name="Password" id="password_inputbox" placeholder="Password">
    <br><br>
    <button style="font-size: 45px;color: white;background-color: royalblue;outline: none;border: none;border-radius: 30px;">PayNow</button>
    <button style="font-size: 45px;color: white;background-color: royalblue;outline: none;border: none;border-radius: 30px;">PayLater</button>
    <button style="font-size: 45px;color: white;background-color: royalblue;outline: none;border: none;border-radius: 30px;">Validate</button>
</body>
</html>
