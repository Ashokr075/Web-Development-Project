<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoogleDoodleTask</title>
    <link rel="stylesheet" href="GoogleDoodleTask.css">
</head>
<body>
    <div id="dummy_container"></div>
    <center>
        <div id="google_doodle_container">
            <div class="google_doodles text_royalblue">
                <marquee behavior="slide" direction="down" scrollamount="50" class="google_doodle_marquees">G</marquee>
            </div>
            <div class="google_doodles text_red">
                <marquee behavior="slide" direction="down" scrollamount="47" class="google_doodle_marquees">o</marquee>
            </div>
            <div class="google_doodles" id="o_letter">
                <marquee behavior="slide" direction="down" scrollamount="44" class="google_doodle_marquees">o</marquee>
            </div>
            <div class="google_doodles text_royalblue">
                <marquee behavior="slide" direction="down" scrollamount="41" class="google_doodle_marquees">g</marquee>
            </div>
            <div class="google_doodles" id="l_letter">
                <marquee behavior="slide" direction="down" scrollamount="38" class="google_doodle_marquees">l</marquee>
            </div>
            <div class="google_doodles text_red">
                <marquee behavior="slide" direction="down" scrollamount="35" class="google_doodle_marquees">e</marquee>
            </div>
        </div>
    </center>
</body>
</html>
