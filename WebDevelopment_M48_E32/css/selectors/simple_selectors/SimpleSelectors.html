<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleSelectors</title>
    <link rel="stylesheet" href="SimpleSelectors.css">
</head>
<body>
    <div id="grand_parent_container">
        <div id="parent_container">
            <div id="grand_child_container"></div>
        </div>
    </div>
    <h1 id="core_java_heading">CoreJava</h1>
    <h1 id="core_python_heading">CorePython</h1>
    <h1 id="web_development_heading">WebDevelopment</h1>
    <input type="text" name="Username" id="username_inputbox" placeholder="Username">
    <input type="password" name="Password" id="password_inputbox" placeholder="Password">
    <br><br>
    <button id="subscribe_button">Subscribe</button>
    <button id="follow_button">Follow</button>
    <br><br>
    <span class="text_darkblue bc_lightblue">SpannedContent</span>
    <q class="text_darkblue bc_lightblue">DoubleQuotedContent</q>
    <marquee class="text_darkblue bolded_content" behavior="" direction="">
        ScrollableContent
    </marquee>
    <i class="text_darkblue increase_fontsize">ItalicsContent</i>
    <b class="text_darkblue increase_fontsize bolded_content">BoldedContent</b>
    <br><br>
    <table id="blood_group_details_table">
        <caption id="blood_group_details_table_caption"><b>BloodGroupDetails</b></caption>
        <thead id="blood_group_details_table_head">
            <!-- first row -->
            <tr id="blood_group_details_table_head_first_row">
                <th class="blood_group_details_table_head_cells">Student<br>Name</th>
                <th class="blood_group_details_table_head_cells">Blood<br>Group</th>
            </tr>
        </thead>
        <tbody id="blood_group_details_table_body">
            <!-- first row -->
            <tr id="blood_group_details_table_body_first_row" class="bc_lightgray_rows">
                <td class="blood_group_details_table_body_cells">Pawan</td>
                <td class="blood_group_details_table_body_cells">B+ve.</td>
            </tr>
            <!-- second row -->
            <tr id="blood_group_details_table_body_second_row" class="bc_lavender_blush_rows">
                <td class="blood_group_details_table_body_cells">Rishi</td>
                <td class="blood_group_details_table_body_cells">A+ve.</td>
            </tr>
            <!-- third row -->
            <tr id="blood_group_details_table_body_third_row" class="bc_lightgray_rows">
                <td class="blood_group_details_table_body_cells">SaiPawan</td>
                <td class="blood_group_details_table_body_cells">AB+ve.</td>
            </tr>
            <!-- fourth row -->
            <tr id="blood_group_details_table_body_fourth_row" class="bc_lavender_blush_rows">
                <td class="blood_group_details_table_body_cells">Sai</td>
                <td class="blood_group_details_table_body_cells">O+ve.</td>
            </tr>
            <!-- fifth row -->
            <tr id="blood_group_details_table_body_fifth_row" class="bc_lightgray_rows">
                <td class="blood_group_details_table_body_cells">Ganesh</td>
                <td class="blood_group_details_table_body_cells">G+ve.</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
