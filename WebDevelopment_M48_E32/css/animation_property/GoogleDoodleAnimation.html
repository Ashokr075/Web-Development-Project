<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoogleDoodleAnimation</title>
    <link rel="stylesheet" href="GoogleDoodleAnimation.css">
</head>
<body>
    <div id="google_doodle_container">
        <div class="google_doodles text_royalblue" id="uppercase_g_letter">G</div>
        <div class="google_doodles text_red" id="first_o_letter">o</div>
        <div class="google_doodles text_orange" id="second_o_letter">o</div>
        <div class="google_doodles text_royalblue" id="lowercase_g_letter">g</div>
        <div class="google_doodles text_green" id="l_letter">l</div>
        <div class="google_doodles text_red" id="e_letter">e</div>
    </div>
