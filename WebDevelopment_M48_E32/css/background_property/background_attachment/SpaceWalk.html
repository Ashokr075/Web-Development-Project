<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpaceWalk</title>
    <link rel="stylesheet" href="SpaceWalk.css">
</head>
<body>
    <marquee behavior="" direction="up" id="rocket_marquee">
        <img src="../../../assets/images/Rocket.png" alt="" id="rocket_image">
    </marquee>
    <marquee behavior="slide" direction="left" id="astronaut_parent_marquee">
        <marquee behavior="slide" direction="down" id="astronaut_child_marquee">
            <img src="../../../assets/images/Astronaut.png" alt="" id="astronaut_image">
        </marquee>
    </marquee>
</body>
</html>
