<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RelativeUnits</title>
    <link rel="stylesheet" href="RelativeUnits.css">
</head>
<body>
    <!-- percentage unit -->
    <div id="parent_block">
        <div id="child_block"></div>
    </div>
    <!-- viewport units -->
    <div id="parent_section">
        <div id="child_section"></div>
    </div>
    <!-- rem and em units -->
    <div id="parent">
        <span id="parent_content">Parent</span>
        <div id="child">
            <span id="child_content">Child</span>
        </div>
    </div>
    <!-- overall difference between percentage and viewport units -->
    <div id="percentage_unit"></div>
    <div id="viewport_unit"></div>
</body>
</html>
