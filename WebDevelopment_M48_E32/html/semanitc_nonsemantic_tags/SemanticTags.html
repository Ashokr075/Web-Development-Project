<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SemanticTags</title>
</head>
<body style="height: 600px;font-size: 50px;text-align: center;">
    <header style="width: 100%;height: 15%;background-color: lightgray;">
        HeaderContainer
        <!--
        primary tools (buttons)
        primary navigation tools
        search inputbox
        logo informations
        -->
    </header>
    <nav style="width: 100%;height: 10%;background-color: lightpink;">
        NavigationBar
        <!-- navigation bar items -->
    </nav>
    <aside style="width: 25%;height: 50%;background-color: orange;float: left;">
        AsideContainer
        <!--
        contents related to main container
        -->
    </aside>
    <main style="width: 50%;height: 50%;float: left;">
        <article style="width: 100%;height: 50%;background-color: lightblue;">
            ArticleContainer
            <!--
            text contents
            parapgraphs
            -->
        </article>
        <section style="width: 100%;height: 50%;background-color: darkblue;color: white;">
            SectionContainer
            <!-- multimedia -->
        </section>
    </main>
    <aside style="width: 25%;height: 50%;background-color: orange;float: right;">
        AsideContainer
        <!-- advertisements -->
    </aside>
    <footer style="width: 100%;height: 25%;background-color: black;float: right;color: lightgray;">
        &copy; Copyrights Reserved 2025.
        <!--
        social media links
        reference webpages links
        copyright informations
        -->
    </footer>
</body>
</html>
