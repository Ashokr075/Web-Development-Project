<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTMLForms</title>
</head>
<body>
    <center>
        <form action="" style="width: fit-content;">
            <!-- form table -->
            <table>
                <caption style="font-size: 65px;background-color: black;color: orange;"><b>Forms(type="text")</b></caption>
                <!-- form table body -->
                <tbody>
                    <!-- first row -->
                    <tr>
                        <td><label for="" style="font-size: 25px;">Username</label></td>
                        <td><input style="font-size: 25px;" type="text" name="Username" id="username_inputbox"></td>
                    </tr>
                    <!-- second row -->
                    <tr>
                        <td><label for="" style="font-size: 25px;">Password</label></td>
                        <td><input type="password" style="font-size: 25px;"></td>
                    </tr>
                    <!-- third row -->
                    <tr>
                        <td><label for="" style="font-size: 25px;">Age</label></td>
                        <td><input type="number" style="font-size: 25px;"></td>
                    </tr>
                    <!-- fourth row -->
                    <tr>
                        <td><label for="" style="font-size: 25px;">MobileNumber</label></td>
                        <td><input type="tel" style="font-size: 25px;"></td>
                    </tr>
                    <!-- fifth row -->
                    <tr>
                        <td><label for="" style="font-size: 25px;">EmailUsername</label></td>
                        <td><input type="email" style="font-size: 25px;"></td>
                    </tr>
                    <!-- sixth row -->
                    <tr>
                        <td><label for="" style="font-size: 25px;">ColorPicker</label></td>
                        <td><input type="color" style="font-size: 25px;"></td>
                    </tr>
                    <!-- seventh row -->
                    <tr>
                        <td><label for="" style="font-size: 25px;">Slider</label></td>
                        <td><input type="range" style="font-size: 25px;"></td>
                    </tr>
                    <!-- eight row -->
                    <tr>
                        <td><label for="" style="font-size: 25px;">DatePicker</label></td>
                        <td><input type="date" style="font-size: 25px;"></td>
                    </tr>
                    <tr>
                        <td><label for="" style="font-size: 25px;">TimePicker</label></td>
                        <td><input type="time" style="font-size: 25px;"></td>
                    </tr>
                    <!-- nineth row -->
                    <tr>
                        <td><label for="" style="font-size: 25px;">MonthPicker</label></td>
                        <td><input type="month" style="font-size: 25px;"></td>
                    </tr>
                    <!-- tenth row -->
                    <tr>
                        <td><label for="" style="font-size: 25px;">WeekPicker</label></td>
                        <td><input type="week" style="font-size: 25px;"></td>
                    </tr>
                    <!-- eleventh row -->
                    <tr>
                        <td><label for="" style="font-size: 25px;">DateTimePicker</label></td>
                        <td><input type="datetime-local" style="font-size: 25px;"></td>
                    </tr>
                    <!-- twelveth row -->
                    <tr>
                        <td><label for="" style="font-size: 25px;">Google</label></td>
                        <td><input type="search" style="font-size: 25px;width: 450px;height: 35px;background-color: lightgray;outline: none;border: none;border-radius: 30px;"></td>
                    </tr>
                    <!-- thirteenth row -->
                    <tr>
                        <td><label for="" style="font-size: 25px;">UploadResume</label></td>
                        <td><input type="file" style="font-size: 25px;"></td>
                    </tr>
                    <!-- fourteenth row -->
                    <tr>
                        <td><label for="" style="font-size: 25px;">Gender</label></td>
                        <td>
                            <input type="radio" name="Gender" style="font-size: 25px;width: 25px;height: 25px;"> <label style="font-size: 25px;" for="">Male</label>
                            <input type="radio" name="Gender" style="font-size: 25px;width: 25px;height: 25px;"> <label style="font-size: 25px;" for="">Female</label>
                            <input type="radio" name="Gender" style="font-size: 25px;width: 25px;height: 25px;"> <label style="font-size: 25px;" for="">TransGender</label>
                            <input type="radio" name="Gender" style="font-size: 25px;width: 25px;height: 25px;"> <label style="font-size: 25px;" for="">TransWoman</label>
                        </td>
                    </tr>
                    <!-- fifteenth row -->
                    <tr>
                        <td><label for="" style="font-size: 25px;">SkillSets</label></td>
                        <td>
                            <input type="checkbox" name="Skills" style="font-size: 25px;width: 25px;height: 25px;"> <label style="font-size: 25px;" for="">HTML</label>
                            <input type="checkbox" name="Skills" style="font-size: 25px;width: 25px;height: 25px;"> <label style="font-size: 25px;" for="">CSS</label>
                            <input type="checkbox" name="Skills" style="font-size: 25px;width: 25px;height: 25px;"> <label style="font-size: 25px;" for="">JavaScript</label>
                            <input type="checkbox" name="Skills" style="font-size: 25px;width: 25px;height: 25px;"> <label style="font-size: 25px;" for="">ReactJS</label>
                        </td>
                    </tr>
                    <!-- last row -->
                    <tr>
                        <td style="text-align: center;"><input type="submit" style="font-size: 25px;outline: none;border: none;color: orange;background-color: black;font-size: 40px;border-radius: 30px;cursor: pointer;"></td>
                        <td style="text-align: center;"><input type="reset" style="font-size: 25px;outline: none;border: none;color: orange;background-color: black;font-size: 40px;border-radius: 30px;cursor: pointer;"></td>
                    </tr>
                </tbody>
            </table>
        </form>
    </center>
</body>
</html>
