<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FormAttributes</title>
</head>
<body>
    <form action="https://www.facebook.com/login" target="_blank">
        <!-- form table -->
        <table>
            <caption style="font-size: 50px;color: orange;background-color: black;"><b>FormAttributes</b></caption>
            <tbody>
                <!-- first row -->
                <tr>
                    <td><label style="font-size: 30px;" for="username_inputbox">Username</label></td>
                    <td colspan="3"><input id="username_inputbox" style="font-size: 30px;" type="text"></td>
                </tr>
                <!-- second row -->
                <tr>
                    <td><label style="font-size: 30px;" for="password_inputbox">Password</label></td>
                    <td colspan="3"><input id="password_inputbox" style="font-size: 30px;" type="password"></td>
                </tr>
                <!-- third row -->
                <tr>
                    <td style="text-align: center;"><input type="submit" value="Login" style="font-size: 35px;outline: none;border: none;color: orange;background-color: black;border-radius: 30px;cursor: pointer;"></td>
                    <td><input type="image" src="../../assets/images/LoginImage.png" style="font-size: 30px;width: 50px;"></td>
                    <td style="text-align: center;"><a href="RegistrationForm.html" target="_blank"><input type="button" value="Register" style="font-size: 35px;outline: none;border: none;color: orange;background-color: black;border-radius: 30px;cursor: pointer;"></a></td>
                    <td style="text-align: center;"><input type="reset" value="Clear" style="font-size: 35px;outline: none;border: none;color: orange;background-color: black;border-radius: 30px;cursor: pointer;"></td>
                </tr>
            </tbody>
        </table>
    </form>
</body>
</html>
