<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrderedList</title>
</head>
<body>
    <h1 style="font-size: 65px;color: orange;background-color: black;">FullStackDevelopmentList</h1>
    <!-- fullstack development list -->
    <ol style="font-size: 30px;" type="A" start="4">
        <!-- fullstack development list items -->
        <li>JavaFullStack
            <!-- java fullstack list -->
            <ol type="a" reversed>
                <!-- java fullstack list items -->
                <li>CoreJava</li>
                <li>AdvancedJava</li>
                <li>SQL</li>
                <li>WebDevelopment</li>
                <li>Aptitude</li>
            </ol>
        </li>
        <li>PythonFullStack
            <!-- python fullstack list -->
            <ol type="I">
                <!-- python fullstack list items -->
                <li>CorePython</li>
                <li>AdvancedPython</li>
                <li>SQL</li>
                <li>WebDevelopment</li>
            </ol>
        </li>
        <li>MERNStack
            <!-- mern stack list -->
            <ol type="i">
                <!-- mern stack list -->
                <li>MongoDB and ExpressJS</li>
                <li>ReactJS and NodeJS</li>
            </ol>
        </li>
    </ol>
</body>
</html>
