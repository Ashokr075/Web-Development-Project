<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BatchScheduleTable</title>
</head>
<body>
    <!-- batch schedule table -->
    <table style="font-size: 35px;">
        <caption style="background-color: black;color: orange;">BatchScheduleTable</caption>
        <!-- batch schedule table head -->
        <thead style="background-color: purple;color: white;">
            <!-- first row -->
            <tr>
                <th>Serial<br>Number</th>
                <th>Subject<br>Name</th>
                <th>Faculty<br>Name</th>
                <th>Batch<br>Timings.</th>
            </tr>
        </thead>
        <!-- batch schedule table body -->
        <tbody>
            <!-- first row -->
            <tr style="background-color: lightgray;">
                <td>1</td>
                <td>WebDevelopment</td>
                <td>Yashwanth</td>
                <td>11:00am - 01:00pm</td>
            </tr>
            <!-- second row -->
            <tr style="background-color: lavenderblush;">
                <td>2</td>
                <td>CoreJava</td>
                <td>Sunil</td>
                <td>01:00pm - 03:00pm</td>
            </tr>
            <!-- third row -->
            <tr style="background-color: lightgray;">
                <td>3</td>
                <td>CorePython</td>
                <td>Kashinath</td>
                <td>04:00pm - 06:00pm</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
