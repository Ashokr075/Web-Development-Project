<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentDetailsTable</title>
</head>
<body>
    <!-- student details table -->
    <table style="font-size: 30px;border: 10px solid darkblue;border-collapse: collapse;float: left;">
        <caption style="font-size: 45px;"><b>StudentDetails</b></caption>
        <!-- student details table head -->
        <thead style="font-size: 45px;">
            <!-- first row -->
            <tr>
                <th style="border: 5px solid black;">RollNumber</th>
                <th style="border: 5px solid black;">StudentName</th>
            </tr>
        </thead>
        <!-- student details table body -->
        <tbody style="text-align: center;">
            <!-- first row -->
            <tr>
                <td style="border: 5px solid black;">65</td>
                <td style="border: 5px solid black;">Sudheer</td>
            </tr>
            <!-- second row -->
            <tr>
                <td style="border: 5px solid black;">73</td>
                <td style="border: 5px solid black;">Rahul</td>
            </tr>
            <!-- third row -->
            <tr>
                <td style="border: 5px solid black;">83</td>
                <td style="border: 5px solid black;">Abhishek</td>
            </tr>
            <!-- fourth row -->
            <tr>
                <td style="border: 5px solid black;">96</td>
                <td style="border: 5px solid black;">Prudhvi</td>
            </tr>
            <!-- fifth row -->
            <tr>
                <td style="border: 5px solid black;">101</td>
                <td style="border: 5px solid black;">Mahesh</td>
            </tr>
        </tbody>
    </table>
    
    <!-- student details table -->
    <table style="font-size: 30px;float: right;">
        <caption style="font-size: 45px;color: white;background-color: purple;"><b>StudentDetails</b></caption>
        <!-- student details table head -->
        <thead style="font-size: 45px;background-color: black;color: orange;">
            <!-- first row -->
            <tr>
                <th>RollNumber</th>
                <th>StudentName</th>
            </tr>
        </thead>
        <!-- student details table body -->
        <tbody style="text-align: center;">
            <!-- first row -->
            <tr style="background-color: lightgray;">
                <td>65</td>
                <td>Sudheer</td>
            </tr>
            <!-- second row -->
            <tr style="background-color: lavenderblush;">
                <td>73</td>
                <td>Rahul</td>
            </tr>
            <!-- third row -->
            <tr style="background-color: lightgray;">
                <td>83</td>
                <td>Abhishek</td>
            </tr>
            <!-- fourth row -->
            <tr style="background-color: lavenderblush;">
                <td>96</td>
                <td>Prudhvi</td>
            </tr>
            <!-- fifth row -->
            <tr style="background-color: lightgray;">
                <td>101</td>
                <td>Mahesh</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
