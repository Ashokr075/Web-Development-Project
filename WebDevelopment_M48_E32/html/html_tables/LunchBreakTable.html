<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LunchBreakTable</title>
</head>
<body>
    <!-- lunch break table -->
    <table style="font-size: 35px;">
        <caption style="font-size: 50px;color: orange;background-color: black;"><b>LunchBreakTable</b></caption>
        <!-- lunch break table body -->
        <tbody style="text-align: center;">
            <!-- first row -->
            <tr style="background-color: lightgray;">
                <td>Science</td>
                <td rowspan="5" style="font-size: 50px;color: white;background-color: purple;width: 65px;"><b>L<br>U<br>N<br>C<br>H<br>B<br>R<br>E<br>A<br>K</b></td>
                <td>English</td>
            </tr>
            <!-- second row -->
            <tr style="background-color: lavenderblush;">
                <td>Social<br>Science</td>
                <td>Tamil</td>
            </tr>
            <!-- third row -->
            <tr style="background-color: lightgray;">
                <td>Physics</td>
                <td>Telugu</td>
            </tr>
            <!-- fourth row -->
            <tr style="background-color: lavenderblush;">
                <td>Chemistry</td>
                <td>Hindi</td>
            </tr>
            <!-- fifth row -->
            <tr style="background-color: lightgray;">
                <td>Psychology</td>
                <td>Maraathi</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
