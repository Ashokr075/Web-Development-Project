<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultipleContainers</title>
</head>
<body>
    <!-- multiple containers container -->
    <div style="width: 100%;height: 630px;font-size: 50px;text-align: center;">
        <!-- header container -->
        <div style="width: 100%;height: 10%;background-color: lightgray;">Header</div>
        <!-- aside parent container -->
        <div style="width: 25%;height: 50%;float: left;">
            <!-- aside children containers -->
            <div style="width: 100%;height: 50%;background-color: lightblue;">AsideOne</div>
            <div style="width: 100%;height: 50%;background-color: darkblue;color: white;">AsideTwo</div>
        </div>
        <!-- d parent container -->
        <div style="width: 75%;height: 50%;float: right;">
            <!-- d children containers -->
            <div style="width: 25%;height: 25%;background-color: brown;color: white;float: left;">DOne</div>
            <div style="width: 25%;height: 25%;background-color: purple;float: left;color: white;">DTwo</div>
            <div style="width: 25%;height: 25%;background-color: red;float: left;color: white;">DThree</div>
            <div style="width: 25%;height: 25%;background-color: black;color: white;float: left;">DFour</div>
            <div style="width: 33.3%;height: 25%;background-color: orange;float: left;">DFive</div>
            <div style="width: 33.3%;height: 25%;background-color: white;float: left;">DSix</div>
            <div style="width: 33.3%;height: 25%;background-color: green;float: left;">DSeven</div>
            <div style="width: 20%;height: 50%;float: left;background-color: lightblue;">DEight</div>
            <div style="width: 20%;height: 50%;float: left;background-color: lightgreen;">DNine</div>
            <div style="width: 20%;height: 50%;float: left;background-color: lightpink;">DTen</div>
            <div style="width: 20%;height: 50%;float: left;background-color: lightyellow;">DEleven</div>
            <div style="width: 20%;height: 50%;float: left;background-color: lightseagreen;">DTwelve</div>
        </div>
        <!-- footer container -->
        <div style="width: 100%;height: 40%;background-color: black;color: white;float: right;">Footer</div>
    </div>
</body>
</html>
