<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarqueeTag</title>
</head>
<body>
    <marquee behavior="" direction="right" scrollamount="50" loop="5" style="font-size: 50px;color: white;background-color: red;">
        ScrollableContent.
    </marquee>
    <marquee behavior="" direction="down" style="width: 50%;color: greenyellow;background-color: gray;font-size: 50px;height: 500px;">
        <p>
            <b>FLASHNEWS:</b> OurStudents has understood, FilePath and LiveServerExecution.
        </p>
    </marquee>
    <!--
    behavior="scroll(default value) | slide | alternate"
    direction="left(default value) | right | up | down"
    scrollamount="6(default value) | speed in number"
    loop="infinite(default value) | iteration count in number"
    -->
</body>
</html>
