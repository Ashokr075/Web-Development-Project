<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScrollableBasketBall</title>
</head>
<body>
    <!-- nested marquee concept -->
    <!-- parent basketball marquee -->
    <marquee behavior="alternate" direction="down" scrollamount="50" style="font-size: 50px;background-color: lightgray;height: 600px;">
        <!-- child basketball marquee -->
        <marquee behavior="alternate" direction="left" scrollamount="50">
            <img src="../../assets/images/BasketBall.png" alt="BasketBallImage" style="width: 200px;">
        </marquee>
    </marquee>
</body>
</html>
