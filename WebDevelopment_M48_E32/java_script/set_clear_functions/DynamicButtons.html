<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DynamicButton</title>
    <link rel="stylesheet" href="DynamicButtons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <script src="DynamicButtons.js" defer></script>
</head>
<body>
    <button id="subscribe_button" class="dynamic_buttons">
        <span class="subscribe_button_tools" id="subscribe_content">Subscribe</span>
        <span class="subscribe_button_tools" id="subscribe_drop_down_icon">
            <i class="fa-solid fa-angle-down"></i>
        </span>
    </button>
</body>
</html>
