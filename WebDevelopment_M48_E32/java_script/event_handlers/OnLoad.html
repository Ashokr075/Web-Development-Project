<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnLoadEventHandler</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;
            font-family: ProductSans;
        }
        @font-face{
            font-family: ProductSans;
            src: url(../../assets/fonts/ProductSansRegular.ttf);
        }
        body{
            padding: 20px;
        }
        #web_development_heading{
            font-size: 5vw;
            position: relative;
            left: -50vw;
            transition: left 500ms;
        }
    </style>
    <script src="OnLoad.js" defer></script>
</head>
<body onload="displayHeading()">
    <h1 id="web_development_heading">WebDevelopment</h1>
</body>
</html>
