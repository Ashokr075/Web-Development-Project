<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnMouseOverOnMouseOutEventHandler</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;
            font-family: ProductSans;
        }
        @font-face{
            font-family: ProductSans;
            src: url(../../assets/fonts/ProductSansRegular.ttf);
        }
        body{
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
        }
        #space_container{
            width: 35vw;
            height: 35vw;
            background-image: url(../../assets/images/Space.png);
            border-radius: 150px;
            cursor: pointer;
        }
        #planet_container{
            width: 75%;
            height: 75%;
            background-image: url(../../assets/images/Sun.png);
            background-size: 100%;
            border-radius: 50%;
            position: relative;
            top: 12.5%;
            left: 12.5%;
        }
    </style>
    <script src="OnMouseOverOnMouseOut.js" defer></script>
</head>
<body>
    <div id="space_container" onmouseover="changePlanetContainerImages()" onmouseout="changePlanetContainerImages()">
        <div id="planet_container"></div>
    </div>
</body>
</html>
