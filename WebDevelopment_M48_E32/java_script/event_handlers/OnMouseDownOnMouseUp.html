<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnMouseDownOnMouseUpEventHandler</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        *{
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;
            font-family: ProductSans;
        }
        @font-face{
            font-family: ProductSans;
            src: url(../../assets/fonts/ProductSansRegular.ttf);
        }
        body{
            padding: 20px;
            width: 100vw;
            height: 100vh;
        }
        #password_inputbox{
            font-size: 3vw;
            font-weight: bold;
            outline: none;
            border: none;
            background-color: lightgray;
            padding: 10px;
            border-radius: 15px;
        }
        #eye_icon_container{
            font-size: 3.5vw;
            position: relative;
            top: 0.75%;
            left: -6.5%;
            cursor: pointer;
        }
    </style>
    <script src="OnMouseDownOnMouseUp.js" defer></script>
</head>
<body>
    <input type="password" name="Password" id="password_inputbox" placeholder="Password">
    <span id="eye_icon_container" onmousedown="showPassword()" onmouseup="hidePassword()">
        <i class="fa-solid fa-eye" id="eye_icon"></i>
    </span>
</body>
</html>
