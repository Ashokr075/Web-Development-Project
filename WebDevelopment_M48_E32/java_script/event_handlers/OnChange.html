<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnChangeEventHandler</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;
            font-family: ProductSans;
        }
        @font-face{
            font-family: ProductSans;
            src: url(../../assets/fonts/ProductSansRegular.ttf);
        }
        body{
            width: 100vw;
            height: 100vh;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }
        #color_drop_down_list{
            width: 30vw;
            height: 15vh;
            background-color: lightgray;
            outline: none;
            border: none;
            text-align: center;
            font-size: 4vw;
            font-weight: bold;
            border-radius: 25px;
            box-shadow: inset 0px 0px 15px gray,inset 0px 0px 30px gray;
            cursor: pointer;
        }
        #color_statement{
            font-size: 7.5vw;
        }
    </style>
    <script src="OnChange.js" defer></script>
</head>
<body>
    <select name="ColorDropDown" id="color_drop_down_list" onchange="changeBodyBackgroundColor()">
        <option>--SelectColor--</option>
        <option>Orange</option>
        <option>PeachPuff</option>
        <option>HotPink</option>
        <option>LightPink</option>
        <option>GreenYellow</option>
    </select>
    <h1 id="color_statement"></h1>
</body>
</html>
