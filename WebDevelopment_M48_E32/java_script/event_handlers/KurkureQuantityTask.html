<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KurkureQuantityTask</title>
    <link rel="stylesheet" href="KurkureQuantityTask.css">
    <script src="KurkureQuantityTask.js" defer></script>
</head>
<body>
    <div id="kurkure_quantity_task_container">
        <div class="kurkure_quantity_task_tools" id="kurkure_image_container"></div>
        <div class="kurkure_quantity_task_tools" id="kurkure_quantity_container">
            <button class="quantity_buttons" id="minus_button" onclick="decrementQuantityValue()">-</button>
            <button class="quantity_buttons" id="quantity_value_button">1</button>
            <button class="quantity_buttons" id="plus_button" onclick="incrementQuantityValue()">+</button>
        </div>
    </div>
</body>
</html>
