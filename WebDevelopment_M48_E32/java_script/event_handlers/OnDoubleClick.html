<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnDoubleClickEventHandler</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;
            font-family: ProductSans;
        }
        @font-face{
            font-family: ProductSans;
            src: url(../../assets/fonts/ProductSansRegular.ttf);
        }
        body{
            width: 100vw;
            height: 100vh;
        }
        #buttons_container{
            width: 50vw;
            height: 50vh;
            padding: 20px;
            background-color: lightgray;
            border-radius: 50%;
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            align-items: center;
            column-gap: 20px;
            position: relative;
            top: -10%;
            left: -15%;
        }
        .color_buttons{
            color: white;
            font-size: 3vw;
            font-weight: bold;
            outline: none;
            border: none;
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
        }
        #red_button{
            background-color: red;
        }
        #green_button{
            background-color: green;
        }
        #darkblue_button{
            background-color: darkblue;
        }
    </style>
    <script src="OnDoubleClick.js" defer></script>
</head>
<body>
    <div id="buttons_container">
        <button class="color_buttons" id="red_button" ondblclick="changeBodyBackgroundColor('red')">Red</button>
        <button class="color_buttons" id="green_button" ondblclick="changeBodyBackgroundColor('green')">Green</button>
        <button class="color_buttons" id="darkblue_button" ondblclick="changeBodyBackgroundColor('darkblue')">DarkBlue</button>
    </div>
</body>
</html>
