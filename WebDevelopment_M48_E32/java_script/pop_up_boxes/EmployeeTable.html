<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmployeeTable</title>
    <link rel="stylesheet" href="EmployeeTable.css">
    <script src="EmployeeTable.js" defer></script>
</head>
<body>
    <table id="employee_table">
        <caption id="employee_table_caption">EmployeeTable</caption>
        <thead id="employee_table_head">
            <tr class="employee_table_head_rows">
                <th class="employee_table_head_cells">EmployeeKey</th>
                <th class="employee_table_head_cells">EmployeeValue</th>
            </tr>
        </thead>
        <tbody id="employee_table_body">
            <tr class="employee_table_body_rows lightgray_rows">
                <td class="employee_table_body_cells employee_key_cells">Name</td>
                <td class="employee_table_body_cells employee_value_cells" id="employee_name_cell"></td>
            </tr>
            <tr class="employee_table_body_rows lavender_blush_rows">
                <td class="employee_table_body_cells employee_key_cells">ID</td>
                <td class="employee_table_body_cells employee_value_cells" id="employee_id_cell"></td>
            </tr>
            <tr class="employee_table_body_rows lightgray_rows">
                <td class="employee_table_body_cells employee_key_cells">Designation</td>
                <td class="employee_table_body_cells employee_value_cells" id="employee_designation_cell"></td>
            </tr>
            <tr class="employee_table_body_rows lavender_blush_rows">
                <td class="employee_table_body_cells employee_key_cells">JobLocation</td>
                <td class="employee_table_body_cells employee_value_cells" id="employee_job_location_cell"></td>
            </tr>
            <tr class="employee_table_body_rows lightgray_rows">
                <td class="employee_table_body_cells employee_key_cells">Domain</td>
                <td class="employee_table_body_cells employee_value_cells" id="employee_domain_cell"></td>
            </tr>
            <tr class="employee_table_body_rows lavender_blush_rows">
                <td class="employee_table_body_cells employee_key_cells">YearsOfExperience</td>
                <td class="employee_table_body_cells employee_value_cells" id="employee_yoe_cell"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
