<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndiaMountainHeader</title>
    <link rel="stylesheet" href="IndianMountainHeader.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>
    <header id="indian_mountain_header_container">
        <div id="left_mountain_container" class="indian_mountain_containers">
            <h1 class="left_mountain_container_headings mountain_container_headings main_headings" id="ind_heading">IND</h1>
            <h1 class="left_mountain_container_headings mountain_container_headings sub_headings" id="moun_heading">MOUN</h1>
        </div>
        <div id="right_mountain_container" class="indian_mountain_containers">
            <h1 class="right_mountain_container_headings mountain_container_headings main_headings" id="ian_heading">IAN</h1>
            <h1 class="right_mountain_container_headings mountain_container_headings sub_headings" id="ntain_heading">NTAIN</h1>
        </div>
    </header>
    <nav id="indian_mountain_navigation_bar">
        <ul id="indian_mountain_navigation_bar_list">
            <li class="indian_mountain_navigation_bar_list_items">Home</li>
            <li class="indian_mountain_navigation_bar_list_items">AboutUS</li>
            <li class="indian_mountain_navigation_bar_list_items">Contact</li>
            <li class="indian_mountain_navigation_bar_list_items"><label for="toggle_checkbox" id="login_label">LOGIN</label></li>
        </ul>
    </nav>
    <input type="checkbox" name="ToggleCheckBox" id="toggle_checkbox">
    <div id="arrow_buttons_container">
        <button class="arrow_buttons" id="left_arrow_button"><i class="fa-solid fa-arrow-left"></i></button>
        <button class="arrow_buttons" id="right_arrow_button"><i class="fa-solid fa-arrow-right"></i></button>
    </div>
    <form action="" id="login_form_container">
        <h1 id="login_heading">Login</h1>
        <input type="text" name="Username" id="username_inputbox" class="input_boxes" placeholder="Username">
        <input type="password" name="Password" id="password_inputbox" class="input_boxes" placeholder="Password">
        <input type="submit" value="LOGIN" id="login_button">
    </form>
</body>
</html>
